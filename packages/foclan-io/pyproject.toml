[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "foclan-io"
version = "1.0.0b1"
description = "Optional Foclan extension for local text, JSON, JSONL, and CSV I/O."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "foclan>=1.0.0b1",
]

[project.optional-dependencies]
test = [
  "pytest>=8.3.0",
]

[project.entry-points."foclan.host_functions"]
foclan-io = "foclan_io:register_host_functions"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
